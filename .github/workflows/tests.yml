name: Tests
run-name: Run tests

on:
  push:
    branches: [main]
    paths:
      - geosolvaro/**
      - tests/**
      - pyproject.toml
      - uv.lock*
      - Dockerfile
      - pytest.ini
  workflow_dispatch:
    inputs:
      os:
        description: 'OS to run on'
        type: choice
        default: 'all'
        options:
          - all
          - ubuntu-latest
          - windows-latest
          - macos-latest
      python:
        description: 'Python version to run'
        type: choice
        default: 'all'
        options:
          - all
          - '3.10'
          - '3.11'
          - '3.12'

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: '3.10'
          - os: ubuntu-latest
            python-version: '3.11'
          - os: ubuntu-latest
            python-version: '3.12'
          - os: windows-latest
            python-version: '3.12'
          - os: macos-latest
            python-version: '3.12'

    steps:
      - name: Decide if this combo should run
        id: should_run
        shell: bash
        run: |
          os_input="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.os || 'all' }}"
          py_input="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.python || 'all' }}"
          run_flag=true
          if [ "$os_input" != "all" ] && [ "$os_input" != "${{ matrix.os }}" ]; then
            run_flag=false
          fi
          if [ "$py_input" != "all" ] && [ "$py_input" != "${{ matrix.python-version }}" ]; then
            run_flag=false
          fi
          echo "run=$run_flag" >> "$GITHUB_OUTPUT"

      - name: Check out repository
        if: steps.should_run.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        if: steps.should_run.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        if: steps.should_run.outputs.run == 'true'
        run: uv sync --all-extras --dev

      - name: Run tests
        if: steps.should_run.outputs.run == 'true'
        run: uv run pytest --verbose --tb=short
